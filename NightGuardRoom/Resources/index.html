<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<title>夜半守舍</title>
<style>
  :root{ --top: env(safe-area-inset-top, 0px); --bottom: env(safe-area-inset-bottom, 0px); --left: env(safe-area-inset-left, 0px); --right: env(safe-area-inset-right, 0px); --hud-top: calc(var(--top) + 8px); --controls-bottom: calc(var(--bottom) + 10px); }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  html,body{ margin:0; width:100%; height:100%; overflow:hidden; background:#070b16; color:#f8e8bd; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif; overscroll-behavior:none; }
  #app{ position:fixed; inset:0; padding:var(--top) var(--right) var(--bottom) var(--left); background:radial-gradient(circle at 50% 12%,#18213d 0%,#070b16 58%,#03050b 100%); }
  #game{ width:100%; height:100%; display:block; }
  #ui{ position:absolute; inset:0; padding:var(--top) var(--right) var(--bottom) var(--left); pointer-events:none; }
  .panel{ position:absolute; left:max(10px,var(--left)); right:max(10px,var(--right)); border:1px solid rgba(255,210,125,.18); background:rgba(10,16,32,.78); box-shadow:0 12px 36px rgba(0,0,0,.36); backdrop-filter:blur(10px); border-radius:18px; }
  #topBar{ top:var(--hud-top); min-height:56px; display:flex; align-items:center; justify-content:space-around; gap:5px; padding:6px 8px; font-size:12px; }
  .stat{ min-width:54px; text-align:center; line-height:1.18; }
  .stat b{ display:block; color:#fff1c8; font-size:14px; }
  #bottomBar{ bottom:var(--controls-bottom); padding:8px; display:flex; flex-direction:column; gap:7px; pointer-events:auto; }
  .command-primary{ display:grid; grid-template-columns:1.08fr 1.08fr 1fr; gap:7px; }
  .command-secondary{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px; }
  .command-system{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px; }
  .drawer{ max-height:0; overflow:hidden; opacity:0; transform:translateY(6px); transition:max-height .18s ease, opacity .18s ease, transform .18s ease; }
  .drawer.open{ max-height:118px; opacity:1; transform:translateY(0); }
  button{ min-height:46px; border:1px solid rgba(255,210,125,.28); border-radius:14px; background:linear-gradient(180deg,#34415f,#1a243d); color:#ffeec7; font-weight:800; font-size:12px; box-shadow:0 5px 0 rgba(0,0,0,.24); padding:5px 4px; }
  button small{ display:block; margin-top:2px; color:#d8e2ff; font-size:10px; font-weight:700; line-height:1.05; }
  button:active{ transform:translateY(2px) scale(.985); box-shadow:0 2px 0 rgba(0,0,0,.25); }
  button:disabled,button[aria-disabled="true"]{ opacity:.72; filter:saturate(.78); background:linear-gradient(180deg,#27304a,#151c30); color:#cdd6ee; border-color:rgba(210,220,255,.22); }
  button:disabled small,button[aria-disabled="true"] small{ color:#ffcf8f; }
  .primary{ background:linear-gradient(180deg,#d79a42,#87542d); border-color:#ffd083; color:#1b1007; }
  .recommended{ outline:2px solid rgba(255,226,146,.88); box-shadow:0 0 16px rgba(255,210,90,.35),0 5px 0 rgba(0,0,0,.24); }
  .danger{ animation:pulseRed .55s infinite alternate; }
  @keyframes pulseRed{ from{ box-shadow:0 0 0 rgba(255,60,70,0); } to{ box-shadow:0 0 22px rgba(255,60,70,.85); border-color:#ff5566; } }
  #overlay{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; padding:calc(var(--top) + 22px) 22px calc(var(--bottom) + 22px); pointer-events:auto; }
  .card{ width:min(92vw,390px); border:1px solid rgba(255,210,125,.28); background:linear-gradient(180deg,rgba(18,27,52,.96),rgba(8,12,24,.96)); border-radius:26px; padding:22px 18px; text-align:center; box-shadow:0 30px 90px rgba(0,0,0,.6); }
  h1{ margin:4px 0 8px; font-size:36px; letter-spacing:4px; color:#ffe6a3; text-shadow:0 0 18px rgba(255,200,80,.25); }
  h2{ margin:6px 0 10px; font-size:28px; color:#ffe6a3; }
  p{ color:#cfd7ee; line-height:1.5; margin:8px 0 16px; }
  .big{ min-height:56px; padding:0 20px; font-size:17px; background:linear-gradient(180deg,#d79a42,#85542c); border-color:#ffd083; color:#1b1007; }
  .hint{ position:absolute; left:18px; right:18px; top:calc(var(--hud-top) + 62px); min-height:22px; text-align:center; color:#ffe6a3; font-weight:800; text-shadow:0 2px 8px #000; pointer-events:none; }
  #rotate{ display:none; position:fixed; inset:0; z-index:10; background:#070b16; color:#ffe6a3; align-items:center; justify-content:center; text-align:center; padding:30px; font-size:22px; }
  @media (max-height:760px){ #topBar{min-height:50px}.stat b{font-size:13px} button{min-height:42px;font-size:11px}.command-secondary,.command-system{gap:5px} }
  @media (orientation:landscape){ #rotate{display:flex;} }
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>
  <div id="ui">
    <div id="topBar" class="panel"></div>
    <div id="hint" class="hint"></div>
    <div id="bottomBar" class="panel"></div>
    <div id="overlay"></div>
  </div>
</div>
<div id="rotate">请竖屏游玩<br><small>转回 iPhone 竖屏后继续守夜</small></div>
<script>
(() => {
'use strict';
const BASE_W = 390, BASE_H = 844;
const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
const topBar = document.getElementById('topBar'), bottomBar = document.getElementById('bottomBar'), overlay = document.getElementById('overlay'), hint = document.getElementById('hint');
let scale=1, ox=0, oy=0, dpr=1, last=0;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const fmtTime=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(Math.floor(s%60)).padStart(2,'0')}`;
function resize(){ dpr=Math.min(window.devicePixelRatio||1,3); canvas.width=Math.floor(innerWidth*dpr); canvas.height=Math.floor(innerHeight*dpr); canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px'; const sw=innerWidth/BASE_W, sh=innerHeight/BASE_H; scale=Math.min(sw,sh); ox=(innerWidth-BASE_W*scale)/2; oy=(innerHeight-BASE_H*scale)/2; ctx.setTransform(dpr*scale,0,0,dpr*scale,dpr*ox,dpr*oy); }
window.addEventListener('resize',resize,{passive:true}); resize();

const CFG={
 duration:300, frenzy:270, maxMonsters:18,
 bed:[{n:'旧草席',c:0,inc:4},{n:'厚草垫',c:35,inc:7},{n:'木榻',c:90,inc:12},{n:'暖铺',c:180,inc:20},{n:'守夜床',c:360,inc:32},{n:'安神榻',c:700,inc:50}],
 door:[{n:'旧木门',coin:0,wood:0,hp:160,red:0},{n:'加固木门',coin:60,wood:2,hp:260,red:.05},{n:'横梁门',coin:150,wood:5,hp:420,red:.10},{n:'铁箍门',coin:320,wood:10,hp:680,red:.15},{n:'厚铁门',coin:650,wood:18,hp:1050,red:.20},{n:'镇夜门',coin:1200,wood:30,hp:1600,red:.25}],
 repair:{wood:3,ratio:.18,cd:8},
 towers:{
  bolt:{name:'竹弩',coin:[45,100,220,460],wood:[1,3,6,10],dmg:[16,28,46,75],rate:[1,.9,.8,.7],range:[150,160,170,180]},
  brazier:{name:'火盆',coin:[80,180,380,760],wood:[3,6,12,20],dps:[8,15,26,42],range:[70,78,86,95]},
  bell:{name:'铜铃阵',coin:[65,150,320,680],wood:[2,5,9,16],slow:[.18,.25,.32,.40],range:[90,100,110,120],dps:[0,2,5,9]}
 },
 enemies:{shade:{n:'夜影',hp:70,spd:36,atk:10,wood:1,col:'#3f4566'},heavy:{n:'重影',hp:190,spd:24,atk:24,wood:2,col:'#553b72'},split:{n:'裂影',hp:120,spd:58,atk:16,wood:2,col:'#305477'},frenzy:{n:'狂影',hp:260,spd:48,atk:34,wood:3,col:'#8e2f45'}}
};
const rooms=[{x:24,y:100,w:120,h:120,side:'L'},{x:246,y:100,w:120,h:120,side:'R'},{x:24,y:260,w:120,h:120,side:'L'},{x:246,y:260,w:120,h:120,side:'R'},{x:24,y:420,w:120,h:120,side:'L'},{x:246,y:420,w:120,h:120,side:'R'}];
function doorPos(r){return r.side==='L'?{x:r.x+r.w,y:r.y+r.h/2}:{x:r.x,y:r.y+r.h/2};}
function slots(r){const sx=r.side==='L'?r.x+r.w-32:r.x+32; return [{x:sx,y:r.y+32},{x:sx,y:r.y+62},{x:sx,y:r.y+92}];}
let audio=null;
function initAudio(){ if(audio) return; try{ const AC=window.AudioContext||window.webkitAudioContext; audio=new AC(); }catch(e){ audio=false; } }
function beep(freq=440,dur=.05,type='sine',gain=.035){ if(!audio) return; const o=audio.createOscillator(), g=audio.createGain(); o.type=type; o.frequency.value=freq; g.gain.value=gain; o.connect(g); g.connect(audio.destination); o.start(); g.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+dur); o.stop(audio.currentTime+dur); }
function vibrate(ms=12){ try{ navigator.vibrate&&navigator.vibrate(ms); }catch(e){} }
function saveStats(win){ const s=JSON.parse(localStorage.getItem('nightGuardStats')||'{}'); s.gamesPlayed=(s.gamesPlayed||0)+1; s.wins=(s.wins||0)+(win?1:0); s.bestSurviveTime=Math.max(s.bestSurviveTime||0, Math.floor(game.t)); s.bestKills=Math.max(s.bestKills||0, game.kills); localStorage.setItem('nightGuardStats',JSON.stringify(s)); }

class Game{
 constructor(){ this.state='TITLE'; this.reset(); }
 reset(){ this.t=0; this.coin=30; this.wood=0; this.bed=0; this.door=0; this.doorHp=CFG.door[0].hp; this.room=-1; this.monsters=[]; this.bullets=[]; this.fx=[]; this.towers=[]; this.spawnCd=5; this.incomeTick=0; this.repairCd=0; this.kills=0; this.warn=0; this.notice=''; this.noticeT=0; this.paused=false; this.roomPickT=0; this.drawerOpen=false; this.confirmRestart=false; }
 start(){ initAudio(); this.reset(); this.state='ROOM_SELECT'; this.notice='选择一间屋子，开始守夜'; this.noticeT=2; beep(520,.06,'triangle'); updateUI(); }
 choose(i){ this.room=i; this.state='PLAYING'; this.t=0; this.spawnCd=6; this.notice='先升级铺位，再加固房门'; this.noticeT=3; beep(660,.08,'triangle'); updateUI(); }
 get r(){ return rooms[this.room]; }
 get dpos(){ return doorPos(this.r); }
 bedNext(){ return CFG.bed[this.bed+1]; }
 doorNext(){ return CFG.door[this.door+1]; }
 canPay(c,w){ return this.coin>=c && this.wood>=w; }
 pay(c,w){ if(!this.canPay(c,w)){ this.notice='资源不足'; this.noticeT=1.2; beep(130,.08,'sawtooth'); vibrate(16); return false;} this.coin-=c; this.wood-=w; beep(720,.05,'triangle'); return true; }
 upgradeBed(){ const n=this.bedNext(); if(n && this.pay(n.c,0)){ this.bed++; this.notice='铺位升级：'+CFG.bed[this.bed].n; this.noticeT=1.4; updateUI(); } }
 upgradeDoor(){ const n=this.doorNext(), old=CFG.door[this.door]; if(n && this.pay(n.coin,n.wood)){ this.door++; this.doorHp += n.hp-old.hp; this.notice='房门加固：'+n.n; this.noticeT=1.4; updateUI(); } }
 repair(){ if(this.repairCd>0){ this.notice='维修冷却中'; this.noticeT=1; return; } if(this.pay(0,CFG.repair.wood)){ this.doorHp=clamp(this.doorHp+CFG.door[this.door].hp*CFG.repair.ratio,0,CFG.door[this.door].hp); this.repairCd=CFG.repair.cd; this.notice='房门已维修'; this.noticeT=1.2; vibrate(18); updateUI(); } }
 build(type){ if(this.towers.length>=3){ this.notice='防御格已满'; this.noticeT=1; return; } const cfg=CFG.towers[type]; if(this.pay(cfg.coin[0],cfg.wood[0])){ const p=slots(this.r)[this.towers.length]; this.towers.push({type,lv:0,x:p.x,y:p.y,cd:0,tick:0}); this.notice='建造 '+cfg.name; this.noticeT=1.2; updateUI(); } }
 upgradeTower(){ if(!this.towers.length){ this.notice='先建造防御设施'; this.noticeT=1; return; } let tw=this.towers.reduce((a,b)=>a.lv<=b.lv?a:b); const cfg=CFG.towers[tw.type]; if(tw.lv>=3){ this.notice='已有设施达到满级'; this.noticeT=1; return; } const nl=tw.lv+1; if(this.pay(cfg.coin[nl],cfg.wood[nl])){ tw.lv=nl; this.notice=cfg.name+' 升至 '+(nl+1)+' 级'; this.noticeT=1.2; updateUI(); } }
 spawnPack(){ let t=this.t, list=['shade']; if(t>30) list.push('shade'); if(t>90) list.push('heavy'); if(t>160) list.push('split','split'); if(t>240) list.push('heavy','shade'); if(t>=270) list=['frenzy','split','split','heavy']; for(let i=0;i<list.length && this.monsters.length<CFG.maxMonsters;i++) this.spawn(list[i],i*.35); }
 spawn(type,delay=0){ const top=Math.random()<.5; const start={x:195,y:top?82:588}; const target=this.dpos; const c=CFG.enemies[type], stage=1+Math.floor(this.t/60)*.18, frenzy=this.t>=CFG.frenzy; const hp=c.hp*stage*(frenzy?1.25:1); this.monsters.push({type,x:start.x,y:start.y-delay*18,hp,maxHp:hp,spd:c.spd*(frenzy?1.15:1),atk:c.atk*stage*(frenzy?1.35:1),wood:c.wood,target,hit:0,attack:false,slow:0}); }
 spawnInterval(){ const t=this.t; if(t<30) return 8; if(t<60) return 7; if(t<90) return 6; if(t<120) return 7; if(t<160) return 6; if(t<210) return 6; if(t<270) return 5; return 4; }
 update(dt){ if(this.state!=='PLAYING'||this.paused) return; this.t+=dt; this.incomeTick+=dt; this.repairCd=Math.max(0,this.repairCd-dt); if(this.noticeT>0) this.noticeT-=dt; if(this.t>=CFG.duration){ this.state='WIN'; saveStats(true); beep(680,.12); setTimeout(()=>beep(880,.14),130); updateUI(); return; }
  while(this.incomeTick>=1){ this.incomeTick-=1; this.coin+=CFG.bed[this.bed].inc; if(Math.floor(this.t)%12===0) beep(900,.025,'sine',.014); }
  for(const grant of [{t:60,w:3},{t:120,w:5},{t:180,w:7},{t:240,w:10}]) if(this.t-dt<grant.t && this.t>=grant.t){ this.wood+=grant.w; this.notice='获得备用木料 +'+grant.w; this.noticeT=1.4; }
  if(this.t-dt<270 && this.t>=270){ this.notice='夜深狂潮来临'; this.noticeT=3; beep(90,.35,'sawtooth',.05); vibrate(45); }
  this.spawnCd-=dt; if(this.spawnCd<=0){ this.spawnPack(); this.spawnCd=this.spawnInterval(); }
  this.updateMonsters(dt); this.updateTowers(dt); this.updateBullets(dt); this.fx=this.fx.filter(f=>(f.life-=dt)>0); if(this.doorHp<=0){ this.doorHp=0; this.state='LOSE'; saveStats(false); beep(180,.2,'sawtooth'); setTimeout(()=>beep(100,.25,'sawtooth'),170); vibrate(80); updateUI(); } }
 updateMonsters(dt){ const dp=this.dpos, red=CFG.door[this.door].red; for(const m of this.monsters){ m.hit=Math.max(0,m.hit-dt); m.slow=0; for(const tw of this.towers) if(tw.type==='bell'){ const cf=CFG.towers.bell; if(dist(m,tw)<=cf.range[tw.lv]) m.slow=Math.max(m.slow,cf.slow[tw.lv]); }
   if(dist(m,dp)>10){ const dx=dp.x-m.x, dy=dp.y-m.y, l=Math.hypot(dx,dy)||1; m.x+=dx/l*m.spd*(1-m.slow)*dt; m.y+=dy/l*m.spd*(1-m.slow)*dt; m.attack=false; } else { m.attack=true; this.doorHp-=m.atk*(1-red)*dt; this.warn=Math.max(this.warn,.3); if(Math.random()<dt*2) { beep(95,.035,'square',.018); vibrate(8); } }
  }
  this.warn=Math.max(0,this.warn-dt); }
 damage(m,amount){ m.hp-=amount; m.hit=.12; this.fx.push({x:m.x,y:m.y,life:.25,col:'#ffd36b'}); if(m.hp<=0){ this.wood+=m.wood; this.coin+=4+Math.floor(this.t/45); this.kills++; beep(300,.04,'triangle',.018); } }
 updateTowers(dt){ for(const tw of this.towers){ const cf=CFG.towers[tw.type]; if(tw.type==='bolt'){ tw.cd-=dt; if(tw.cd<=0){ const target=this.monsters.filter(m=>dist(m,tw)<=cf.range[tw.lv]).sort((a,b)=>(b.attack-a.attack)||dist(a,this.dpos)-dist(b,this.dpos))[0]; if(target){ tw.cd=cf.rate[tw.lv]; this.bullets.push({x:tw.x,y:tw.y,tx:target.x,ty:target.y,life:.16,col:'#ffd65a'}); this.damage(target,cf.dmg[tw.lv]); beep(560,.025,'square',.012); } } }
   if(tw.type==='brazier'){ tw.tick-=dt; if(tw.tick<=0){ tw.tick=.5; for(const m of this.monsters) if(dist(m,tw)<=cf.range[tw.lv]) this.damage(m,cf.dps[tw.lv]*.5); } }
   if(tw.type==='bell'){ const cf=CFG.towers.bell; if(cf.dps[tw.lv]>0){ tw.tick-=dt; if(tw.tick<=0){ tw.tick=.5; for(const m of this.monsters) if(dist(m,tw)<=cf.range[tw.lv]) this.damage(m,cf.dps[tw.lv]*.5); } } }
  }
  this.monsters=this.monsters.filter(m=>m.hp>0); }
 updateBullets(dt){ for(const b of this.bullets) b.life-=dt; this.bullets=this.bullets.filter(b=>b.life>0); }
}
const game=new Game(); window.game=game;
function cost(c,w){ return `${c?c+'铜 ':''}${w?w+'木':''}`.trim()||'满级'; }
function shortage(c=0,w=0){ const parts=[]; if(game.coin<c) parts.push(`缺 ${Math.ceil(c-game.coin)}铜`); if(game.wood<w) parts.push(`缺 ${w-game.wood}木`); return parts.join(' ') || ''; }
function disabledReason(c=0,w=0,extra=''){ return extra || shortage(c,w); }
function btn(label,sub,fn,dis=false,cls='',reason=''){
 const disabledAttr=dis?'disabled aria-disabled="true"':'';
 const small=dis&&reason?reason:(sub||'');
 return `<button class="${cls}" ${disabledAttr} data-act="${fn}">${label}<small>${small}</small></button>`;
}
function recommendedAction(bn,dn,hpPct){ if(hpPct<.35 && game.wood>=CFG.repair.wood) return 'repair'; if(bn && game.canPay(bn.c,0)) return 'bed'; if(dn && game.canPay(dn.coin,dn.wood)) return 'door'; if(game.towers.length<2 && game.canPay(CFG.towers.bolt.coin[0],CFG.towers.bolt.wood[0])) return 'moreBuild'; return 'moreBuild'; }
function towerUpgradeText(){ if(!game.towers.length)return '无设施'; let tw=game.towers.reduce((a,b)=>a.lv<=b.lv?a:b); if(tw.lv>=3)return '已满级'; const cf=CFG.towers[tw.type]; return `${cf.name} ${cost(cf.coin[tw.lv+1],cf.wood[tw.lv+1])}`; }
function towerUpgradeDisabledReason(){ if(!game.towers.length)return '先建防御'; let tw=game.towers.reduce((a,b)=>a.lv<=b.lv?a:b); if(tw.lv>=3)return '已满级'; const cf=CFG.towers[tw.type], nl=tw.lv+1; return shortage(cf.coin[nl],cf.wood[nl]); }
function updateUI(){ const hpMax=CFG.door[game.door].hp, hpPct=game.doorHp/hpMax; topBar.innerHTML=`<div class="stat">时间<b>${fmtTime(Math.max(0,CFG.duration-game.t))}</b></div><div class="stat">铜钱<b>${Math.floor(game.coin)}</b></div><div class="stat">木料<b>${game.wood}</b></div><div class="stat">门<b>${Math.ceil(game.doorHp)}/${hpMax}</b></div>`; topBar.classList.toggle('danger', game.state==='PLAYING' && hpPct<.28);
 if(game.state==='PLAYING'){
  const bn=game.bedNext(), dn=game.doorNext(), rec=recommendedAction(bn,dn,hpPct);
  const repairBlocked = game.repairCd>0 || !game.canPay(0,CFG.repair.wood);
  bottomBar.style.display='flex';
  const bedReason=bn?disabledReason(bn.c,0):'已满级', doorReason=dn?disabledReason(dn.coin,dn.wood):'已满级';
  const repairReason=game.repairCd>0?`${game.repairCd.toFixed(0)}秒后可修`:disabledReason(0,CFG.repair.wood);
  const restartLabel=game.confirmRestart?'确认重开':'重开';
  bottomBar.innerHTML=`<div class="command-primary">${[
   btn('升级铺位', bn?`Lv${game.bed+1}→${game.bed+2} ${cost(bn.c,0)}`:'已满级','bed', !bn||!game.canPay(bn.c,0), rec==='bed'?'primary recommended':'primary', bedReason),
   btn('加固房门', dn?`Lv${game.door+1}→${game.door+2} ${cost(dn.coin,dn.wood)}`:'已满级','door', !dn||!game.canPay(dn.coin,dn.wood), rec==='door'?'recommended':'', doorReason),
   btn('维修房门', game.repairCd>0?`${game.repairCd.toFixed(0)}s`:`${CFG.repair.wood}木`,'repair', repairBlocked, hpPct<.35?'danger recommended':'', repairReason)
  ].join('')}</div><div class="command-secondary">${[
   btn(game.drawerOpen?'收起建造':'建造防御', game.towers.length>=3?'防御格已满':'弩/火/铃','moreBuild', game.towers.length>=3, rec==='moreBuild'?'recommended':'', '防御格已满'),
   btn('升级设施', towerUpgradeText(),'towerUp', !game.towers.length || towerUpgradeDisabledReason()==='已满级' || !!towerUpgradeDisabledReason(), '', towerUpgradeDisabledReason()),
   btn(game.paused?'继续':'暂停', game.paused?'恢复守夜':'守夜中','pause')
  ].join('')}</div><div class="drawer ${game.drawerOpen?'open':''}"><div class="command-secondary">${[
   btn('建竹弩', cost(CFG.towers.bolt.coin[0],CFG.towers.bolt.wood[0]),'bolt', game.towers.length>=3||!game.canPay(CFG.towers.bolt.coin[0],CFG.towers.bolt.wood[0]),'', game.towers.length>=3?'防御格已满':shortage(CFG.towers.bolt.coin[0],CFG.towers.bolt.wood[0])),
   btn('建火盆', cost(CFG.towers.brazier.coin[0],CFG.towers.brazier.wood[0]),'brazier', game.towers.length>=3||!game.canPay(CFG.towers.brazier.coin[0],CFG.towers.brazier.wood[0]),'', game.towers.length>=3?'防御格已满':shortage(CFG.towers.brazier.coin[0],CFG.towers.brazier.wood[0])),
   btn('建铜铃', cost(CFG.towers.bell.coin[0],CFG.towers.bell.wood[0]),'bell', game.towers.length>=3||!game.canPay(CFG.towers.bell.coin[0],CFG.towers.bell.wood[0]),'', game.towers.length>=3?'防御格已满':shortage(CFG.towers.bell.coin[0],CFG.towers.bell.wood[0]))
  ].join('')}</div></div><div class="command-system">${[
   btn('提示', hpPct<.35?'先维修房门':(bn?'优先升级铺位':'补强防御'),'noop'),
   btn(restartLabel, game.confirmRestart?'再次点击生效':'防误触','restart', false, game.confirmRestart?'danger':''),
   btn('目标', `${Math.ceil(CFG.duration-game.t)}秒到天亮`,'noop')
  ].join('')}</div>`;
 } else { bottomBar.style.display='none'; }
 renderOverlay(); }
function renderOverlay(){ if(game.state==='TITLE'){ overlay.innerHTML=`<div class="card"><h1>夜半守舍</h1><p>进入旧楼，守住房门。休息积攒铜钱，建造防御设施，在夜影破门前坚持到天亮。</p><button class="big" data-act="start">开始守夜</button><p><small>原创 2D 策略塔防生存 · 离线版</small></p></div>`; }
 else if(game.state==='ROOM_SELECT'){ overlay.innerHTML=''; }
 else if(game.state==='WIN'||game.state==='LOSE'){ const win=game.state==='WIN'; overlay.innerHTML=`<div class="card"><h2>${win?'天亮了':'门破了'}</h2><p>${win?'你守住了这间屋子。':'夜色涌入屋内，守夜失败。'}</p><p>生存 ${Math.floor(game.t)} 秒 · 击退 ${game.kills} · 铺位 Lv${game.bed+1} · 房门 Lv${game.door+1}</p><button class="big" data-act="again">再守一夜</button><br><br><button data-act="title">返回标题</button></div>`; }
 else overlay.innerHTML=''; }
function handleAction(a){ initAudio(); if(audio&&audio.state==='suspended') audio.resume(); if(a==='noop') return; if(a!=='restart') game.confirmRestart=false; if(a==='start') game.start(); else if(a==='again') game.start(); else if(a==='title'){game.state='TITLE'; updateUI();} else if(a==='restart'){ if(game.state==='PLAYING' && !game.confirmRestart){ game.confirmRestart=true; game.notice='再次点击确认重开'; game.noticeT=2; updateUI(); return; } game.start(); } else if(a==='moreBuild'){ game.drawerOpen=!game.drawerOpen; updateUI(); } else if(a==='pause'){game.paused=!game.paused; updateUI();} else if(game.state==='PLAYING'){ if(a==='bed') game.upgradeBed(); if(a==='door') game.upgradeDoor(); if(a==='repair') game.repair(); if(['bolt','brazier','bell'].includes(a)){ game.drawerOpen=false; game.build(a); updateUI(); } if(a==='towerUp') game.upgradeTower(); } }
document.addEventListener('pointerdown',e=>{ const b=e.target.closest('button'); if(b&&b.dataset.act){ e.preventDefault(); handleAction(b.dataset.act); } else if(game.state==='ROOM_SELECT'){ const x=(e.clientX-ox)/scale, y=(e.clientY-oy)/scale; rooms.forEach((r,i)=>{ if(x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h) game.choose(i); }); } },{passive:false});

function drawRoundRect(x,y,w,h,r,fill,stroke){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); if(fill){ctx.fillStyle=fill;ctx.fill();} if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke();} }
function draw(){ ctx.clearRect(0,0,BASE_W,BASE_H); const frenzy=game.state==='PLAYING'&&game.t>=CFG.frenzy; const grd=ctx.createLinearGradient(0,0,0,BASE_H); grd.addColorStop(0,frenzy?'#230b18':'#0b1020'); grd.addColorStop(1,'#05070d'); ctx.fillStyle=grd; ctx.fillRect(0,0,BASE_W,BASE_H); drawMap(); drawEntities(); drawVignette(); hint.textContent=game.noticeT>0?game.notice:(game.state==='ROOM_SELECT'?'选择一间屋子，开始守夜':''); }
function drawMap(){ ctx.save(); ctx.translate(0,0); drawRoundRect(160,86,70,510,18,'#1b2238','#303a59'); ctx.fillStyle='rgba(255,215,130,.05)'; for(let y=110;y<580;y+=46) ctx.fillRect(188,y,14,24);
 rooms.forEach((r,i)=>{ const chosen=i===game.room, selectable=game.state==='ROOM_SELECT'; drawRoundRect(r.x,r.y,r.w,r.h,16, chosen?'#332b32':'#242333', selectable?'#6d7ba6':'rgba(255,255,255,.08)'); ctx.fillStyle='rgba(0,0,0,.24)'; ctx.fillRect(r.x+8,r.y+r.h-18,r.w-16,8); const d=doorPos(r); ctx.fillStyle=chosen?'#d79a42':'#7a4f2a'; ctx.fillRect(d.x-6,d.y-28,12,56); ctx.fillStyle='#9fb4df'; ctx.font='12px sans-serif'; ctx.textAlign='center'; if(selectable) ctx.fillText('空房 '+(i+1),r.x+r.w/2,r.y+r.h/2+4); if(chosen) drawRoomInterior(r); }); ctx.restore(); }
function drawRoomInterior(r){ ctx.save(); const bedX=r.side==='L'?r.x+18:r.x+r.w-66; drawRoundRect(bedX,r.y+18,48,32,9,'#33537f','#6da5ff'); ctx.fillStyle='#ffd27d'; ctx.beginPath(); ctx.arc(r.x+r.w/2,r.y+r.h/2,14,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#2b1d18'; ctx.fillRect(r.x+r.w/2-7,r.y+r.h/2+10,14,18); slots(r).forEach((s,idx)=>{ const tw=game.towers[idx]; ctx.beginPath(); ctx.arc(s.x,s.y,12,0,Math.PI*2); ctx.fillStyle=tw?'#3e506e':'rgba(255,255,255,.08)'; ctx.fill(); ctx.strokeStyle=tw?'#ffd36b':'rgba(255,255,255,.18)'; ctx.stroke(); if(tw) drawTower(tw); }); const hp=game.doorHp/CFG.door[game.door].hp; ctx.fillStyle='#421018'; ctx.fillRect(r.x+16,r.y+6,r.w-32,7); ctx.fillStyle=hp<.3?'#ff4a5b':'#5ce28a'; ctx.fillRect(r.x+16,r.y+6,(r.w-32)*hp,7); ctx.restore(); }
function drawTower(tw){ const cf=CFG.towers[tw.type]; ctx.save(); ctx.translate(tw.x,tw.y); if(tw.type==='bolt'){ ctx.fillStyle='#ad8350'; ctx.fillRect(-4,-17,8,26); ctx.fillStyle='#d7ba78'; ctx.fillRect(-15,-4,30,8); }
 else if(tw.type==='brazier'){ ctx.fillStyle='#7a3b25'; ctx.beginPath(); ctx.arc(0,0,11,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#ff9845'; ctx.beginPath(); ctx.arc(0,-4,7+Math.sin(game.t*8)*2,0,Math.PI*2); ctx.fill(); }
 else { ctx.strokeStyle='#b9d1ff'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.stroke(); ctx.fillStyle='#e8d58a'; ctx.fillRect(-4,-13,8,26); }
 ctx.fillStyle='#fff3b0'; ctx.font='9px sans-serif'; ctx.textAlign='center'; ctx.fillText(tw.lv+1,0,4); ctx.restore(); }
function drawEntities(){ if(game.state==='PLAYING'||game.state==='WIN'||game.state==='LOSE'){ for(const b of game.bullets){ ctx.strokeStyle=b.col; ctx.lineWidth=3; ctx.globalAlpha=clamp(b.life/.16,0,1); ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(b.tx,b.ty); ctx.stroke(); ctx.globalAlpha=1; }
  for(const m of game.monsters) drawMonster(m); for(const f of game.fx){ ctx.globalAlpha=clamp(f.life/.25,0,1); ctx.fillStyle=f.col; ctx.beginPath(); ctx.arc(f.x,f.y,8*(1-f.life/.25),0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; } }
}
function drawMonster(m){ const c=CFG.enemies[m.type]; ctx.save(); ctx.translate(m.x,m.y+Math.sin((game.t+m.x)*6)*2); ctx.globalAlpha=m.hit>0?.55:1; ctx.fillStyle=c.col; ctx.strokeStyle=game.t>=CFG.frenzy?'#ff6070':'#9097cf'; ctx.lineWidth=2; ctx.beginPath(); ctx.ellipse(0,0,m.type==='heavy'?16:12,m.type==='split'?18:13,0,0,Math.PI*2); ctx.fill(); ctx.stroke(); ctx.fillStyle='#dfe7ff'; ctx.fillRect(-5,-3,3,3); ctx.fillRect(4,-3,3,3); ctx.fillStyle='#361018'; ctx.fillRect(-13,-21,26,4); ctx.fillStyle='#e35b5b'; ctx.fillRect(-13,-21,26*(m.hp/m.maxHp),4); ctx.restore(); }
function drawVignette(){ const low=game.state==='PLAYING' && game.doorHp/CFG.door[game.door].hp<.3; if(game.warn>0||low||game.t>=CFG.frenzy){ ctx.save(); ctx.globalAlpha=(low?.18:0)+(game.warn*.35)+(game.t>=CFG.frenzy?.12:0); ctx.strokeStyle='#ff304d'; ctx.lineWidth=18; ctx.strokeRect(9,9,BASE_W-18,BASE_H-18); ctx.restore(); } }
function loop(ts){ const dt=Math.min(.05,(ts-last)/1000||0); last=ts; game.update(dt); draw(); requestAnimationFrame(loop); }
setInterval(()=>{ if(game.state==='PLAYING') updateUI(); },250); updateUI(); requestAnimationFrame(loop);
})();
</script>
</body>
