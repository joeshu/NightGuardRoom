name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || true
      - name: Build app without signing
        run: |
          xcodebuild             -project NightGuardRoom.xcodeproj             -scheme NightGuardRoom             -configuration Release             -sdk iphoneos             -derivedDataPath build             CODE_SIGNING_ALLOWED=NO             CODE_SIGNING_REQUIRED=NO             CODE_SIGN_IDENTITY=""             clean build
      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" -maxdepth 1 | head -1)
          test -n "$APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry NightGuardRoom-unsigned.ipa Payload
          shasum -a 256 NightGuardRoom-unsigned.ipa > NightGuardRoom-unsigned.ipa.sha256
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: NightGuardRoom-unsigned-ipa
          path: |
            NightGuardRoom-unsigned.ipa
            NightGuardRoom-unsigned.ipa.sha256
